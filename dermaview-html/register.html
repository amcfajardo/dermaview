<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DermaView Register</title>

  <link rel="stylesheet" href="styles/global.css?v=20260526-6" />
  <link rel="stylesheet" href="styles/header.css" />

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .auth-card {
      width: 100%;
      max-width: 500px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
    }

    .auth-title {
      margin: 0 0 12px;
      font-size: 2rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
    }

    .auth-subtitle {
      margin: 0 0 32px;
      text-align: center;
      color: #6b7280;
      line-height: 1.6;
    }

    .auth-form {
      display: grid;
      gap: 18px;
    }

    .auth-input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      transition: border-color 180ms ease;
      box-sizing: border-box;
    }

    .auth-input:focus {
      border-color: #2563eb;
    }

    .auth-button {
      border: none;
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 180ms ease;
    }

    .auth-button:hover {
      opacity: 0.96;
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .auth-card {
        padding: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="auth-page">

    <div class="auth-card">

      <h1 class="auth-title">Create Account</h1>

      <p class="auth-subtitle">
        Register your employee account. An admin will review it and assign your role.
      </p>

     <form id="registerForm" class="auth-form">

  <input
    type="email"
    name="email"
    placeholder="Email Address"
    class="auth-input"
    required
  />

  <input
    type="text"
    name="first_name"
    placeholder="First Name"
    class="auth-input"
    required
  />

  <input
    type="text"
    name="last_name"
    placeholder="Last Name"
    class="auth-input"
    required
  />

  <input
    type="text"
    name="otp"
    id="registrationOtp"
    placeholder="Enter Email OTP"
    class="auth-input"
    inputmode="numeric"
    pattern="[0-9]{6}"
    maxlength="6"
    hidden
  />

  <input
    type="password"
    name="password"
    placeholder="Password"
    class="auth-input"
    minlength="8"
    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}"
    title="Password must be at least 8 characters and include uppercase, lowercase, number, and special character."
    required
  />

  <input
    type="password"
    name="confirm_password"
    placeholder="Confirm Password"
    class="auth-input"
    autocomplete="new-password"
    required
  />

  <button type="submit" class="auth-button">
    Send OTP
  </button>

</form>

      <div class="auth-footer">
        Already have an account?
        <a href="index.html">Login</a>
      </div>

    </div>

  </div>

  <script src="system-branding.js?v=20260527-1"></script>
  <script src="app-dialog.js?v=20260627-1"></script>
  <script src="password-policy.js"></script>
  <script src="register.js?v=20260627-1"></script>

</body>
</html>

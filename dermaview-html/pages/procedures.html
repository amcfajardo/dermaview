<html lang="en"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Global Styles -->
    <link rel="stylesheet" href="../style.css" />

    <!-- Component Styles -->

  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="header-inner">
          <a href="../index.html" class="brand">
            <span class="brand-mark">D</span>
            <span class="brand-name">DermaView</span>
          </a>
          <nav class="top-nav">
            <a href="../index.html">Home</a>
            <a href="../pages/procedures.html">Procedures</a>
          </nav>
        </div>
      </header>

      <main id="app" class="app-content">
    <section class="section-grid">
      <div>
        <h2 class="section-heading">Available Procedures</h2>
        <p class="section-text">Explore our comprehensive selection of dermatological treatments and procedures.</p>
      </div>
    </section>
    <div class="grid-2">
      <div>
        
          <button class="procedure-card " data-procedure="acne-treatment">
            <div>
              <h3>Acne Treatment</h3>
              <p>Advanced laser and light-based treatments for acne-prone skin</p>
            </div>
            <span class="procedure-chip">Treatment</span>
          </button>
        
          <button class="procedure-card " data-procedure="skin-rejuvenation">
            <div>
              <h3>Skin Rejuvenation</h3>
              <p>Comprehensive anti-aging and texture improvement procedures</p>
            </div>
            <span class="procedure-chip">Rejuvenation</span>
          </button>
        
          <button class="procedure-card " data-procedure="scar-reduction">
            <div>
              <h3>Scar Reduction</h3>
              <p>Specialized treatments to minimize the appearance of scars</p>
            </div>
            <span class="procedure-chip">Treatment</span>
          </button>
        
          <button class="procedure-card " data-procedure="pigmentation-correction">
            <div>
              <h3>Pigmentation Correction</h3>
              <p>Treatment for hyperpigmentation, melasma, and sun damage</p>
            </div>
            <span class="procedure-chip">Correction</span>
          </button>
        
          <button class="procedure-card " data-procedure="hair-removal">
            <div>
              <h3>Hair Removal</h3>
              <p>Permanent and semi-permanent hair removal solutions</p>
            </div>
            <span class="procedure-chip">Hair</span>
          </button>
        
          <button class="procedure-card " data-procedure="wrinkle-reduction">
            <div>
              <h3>Wrinkle Reduction</h3>
              <p>Advanced treatments to smooth lines and wrinkles</p>
            </div>
            <span class="procedure-chip">Rejuvenation</span>
          </button>
        
      </div>
      <div class="panel-card">
        
    <div class="empty-state">
      <div>
        <p>Select a procedure to view details</p>
      </div>
    </div>
  
      </div>
    </div>
  </main>
    </div>

    <script src="app.js"></script>
  

</body></html>

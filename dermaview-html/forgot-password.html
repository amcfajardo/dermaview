<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password</title>

  <link rel="stylesheet" href="styles/global.css?v=20260526-6">
  <link rel="stylesheet" href="styles/header.css">

  <style>
    /* reuse login auth styles */
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }
    .auth-card { width:100%; max-width:450px; background:white; border:1px solid #e5e7eb; border-radius:28px; padding:40px; box-shadow:0 24px 80px rgba(15,23,42,0.08); }
    .auth-title { margin:0 0 12px; font-size:2rem; font-weight:700; color:#111827; text-align:center; }
    .auth-subtitle { margin:0 0 24px; text-align:center; color:#6b7280; }
    .auth-form { display:grid; gap:18px; }
    .auth-input { width:100%; padding:16px; border-radius:14px; border:1px solid #d1d5db; font-size:1rem; outline:none; box-sizing:border-box; }
    .auth-input:focus { border-color:#2563eb; }
    .auth-button { border:none; border-radius:14px; padding:16px; background:linear-gradient(90deg,#2563eb,#7c3aed); color:white; font-size:1rem; font-weight:700; cursor:pointer; }
  </style>

</head>

<body>

<div class="auth-page">

  <div class="auth-card">

    <h1 class="auth-title">Forgot Password</h1>

    <p class="auth-subtitle">Enter your employee number or email to receive a reset code.</p>

    <form id="forgotPasswordForm" class="auth-form">

      <input
        type="text"
        name="employee_number"
        placeholder="Employee number or email"
        class="auth-input"
        required
      >

      <button type="submit" class="auth-button">
        Send Code
      </button>

    </form>

    <div style="text-align:center; margin-top:16px;">
      <a href="index.html">Back to login</a>
    </div>

  </div>

</div>

<script src="system-branding.js?v=20260527-1"></script>
<script src="app-dialog.js?v=20260627-1"></script>
<script src="forgot-password.js?v=20260626-1"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DermaView Login</title>

  <link rel="stylesheet" href="styles/global.css" />
  <link rel="stylesheet" href="styles/header.css" />

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
    }

    .auth-title {
      margin: 0 0 12px;
      font-size: 2rem;
      font-weight: 700;
      color: #111827;
      text-align: center;
    }

    .auth-subtitle {
      margin: 0 0 32px;
      text-align: center;
      color: #6b7280;
    }

    .auth-form {
      display: grid;
      gap: 18px;
    }

    .auth-input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 1rem;
      outline: none;
      transition: border-color 180ms ease;
      box-sizing: border-box;
    }

    .auth-input:focus {
      border-color: #2563eb;
    }

    .auth-button {
      border: none;
      border-radius: 14px;
      padding: 16px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      color: #6b7280;
    }

    .auth-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">

      <h1 class="auth-title">Welcome Back</h1>

      <p class="auth-subtitle">
        Login to your DermaView account
      </p>

      <form id="loginForm" class="auth-form">

  <input
    type="text"
    name="employee_number"
    placeholder="Employee Number"
    class="auth-input"
    required
  />

  <input
    type="password"
    name="password"
    placeholder="Password"
    class="auth-input"
    required
  />

  <button
    type="submit"
    class="auth-button"
  >
    Login
  </button>

</form>
<div style="text-align:center; margin-top:16px;">
  <a href="forgot-password.html">
    Forgot Password?
  </a>
</div>
      <div class="auth-footer">
        Don't have an account?
        <a href="register.html">Register</a>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>

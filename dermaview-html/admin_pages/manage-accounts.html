<div class="panel-card">
  <h3>Manage Staff / Employee Accounts</h3>

  <p class="section-text">
    Create, update, deactivate, and manage accounts who can access the DermaView system.
  </p>

  <form id="accountForm" class="auth-form" style="margin-top: 18px;">
    <input type="hidden" name="action" value="add">

    <input type="text" name="first_name" placeholder="First Name" class="auth-input" required>
    <input type="text" name="last_name" placeholder="Last Name" class="auth-input" required>
    <input type="email" name="email" placeholder="Email Address" class="auth-input" required>
    <input type="text" name="employee_number" placeholder="Employee Number" class="auth-input" required>

    <select name="role" class="auth-input" required>
      <option value="">Select Role</option>
      <option value="admin">Admin</option>
      <option value="staff">Staff / Employee</option>
      <option value="patient">Patient / User</option>
    </select>

    <input type="password" name="password" placeholder="Temporary Password" class="auth-input" required>

    <button type="submit" class="auth-button">
      Add Account
    </button>
  </form>

  <hr style="margin: 24px 0;">

  <h4>User / Staff / Employee Accounts</h4>

  <table style="width:100%; border-collapse: collapse; margin-top: 12px;">
    <thead>
      <tr>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Name</th>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Email</th>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Employee Number</th>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Role</th>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Status</th>
        <th style="text-align:left; padding:10px; border-bottom:1px solid #ddd;">Actions</th>
      </tr>
    </thead>

    <tbody id="accountsTableBody">
      <tr>
        <td colspan="6" style="padding:10px; text-align:center;">
          Loading accounts...
        </td>
      </tr>
    </tbody>
  </table>
</div>

<script>
(function () {
  const accountForm = document.getElementById('accountForm');
  const accountsTableBody = document.getElementById('accountsTableBody');

  if (!accountForm || !accountsTableBody) return;

  const apiUrl = new URL('admin_pages/manage-accounts.php', window.location.href).href;

  function loadAccounts() {
    const formData = new FormData();
    formData.append('action', 'fetch');

    fetch(apiUrl, {
      method: 'POST',
      body: formData
    })
    .then(response => response.text())
    .then(html => {
      accountsTableBody.innerHTML = html;
    })
    .catch(() => {
      accountsTableBody.innerHTML = `
        <tr>
          <td colspan="6" style="padding:10px; text-align:center;">
            Failed to load accounts.
          </td>
        </tr>
      `;
    });
  }

  accountForm.addEventListener('submit', function (e) {
    e.preventDefault();

    const formData = new FormData(accountForm);

    fetch(apiUrl, {
      method: 'POST',
      body: formData
    })
    .then(response => response.text())
    .then(message => {
      alert(message);
      accountForm.reset();
      loadAccounts();
    })
    .catch(() => {
      alert('Failed to add account.');
    });
  });

  accountsTableBody.addEventListener('click', function (e) {
    if (!e.target.classList.contains('deactivate-btn')) return;

    const id = e.target.dataset.id;

    if (!confirm('Deactivate this account?')) return;

    const formData = new FormData();
    formData.append('action', 'deactivate');
    formData.append('id', id);

    fetch(apiUrl, {
      method: 'POST',
      body: formData
    })
    .then(response => response.text())
    .then(message => {
      alert(message);
      loadAccounts();
    })
    .catch(() => {
      alert('Failed to deactivate account.');
    });
  });

  loadAccounts();
})();
</script>

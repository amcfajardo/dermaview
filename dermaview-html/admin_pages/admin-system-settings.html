<div class="panel-card accounts-panel admin-content-panel">
  <div class="accounts-header">
    <div>
      <h3>System Settings</h3>
      <p class="section-text">Manage clinic identity, contact details, session behavior, email defaults, report text, and maintenance controls.</p>
    </div>
    <button type="button" class="accounts-create-btn" id="saveSystemSettingsTop">Save Settings</button>
  </div>

  <form id="systemSettingsForm" class="accounts-form system-settings-form">
    <div class="accounts-field accounts-field-wide">
      <label for="clinicName">Clinic Name</label>
      <input id="clinicName" class="accounts-input" value="DermaView">
    </div>

    <div class="accounts-field accounts-field-wide">
      <label for="clinicLogo">Logo Upload</label>
      <input id="clinicLogo" type="file" accept="image/png,image/jpeg,image/jpg" class="accounts-input">
      <div id="clinicLogoPreview" class="system-logo-preview">D</div>
    </div>

    <div class="accounts-field accounts-field-full">
      <label for="contactInfo">Contact Info</label>
      <textarea id="contactInfo" class="accounts-input" placeholder="Phone, email, address, clinic hours"></textarea>
    </div>

    <div class="accounts-field">
      <label for="sessionTimeout">Session Timeout</label>
      <input id="sessionTimeout" type="number" min="5" max="480" class="accounts-input" value="30">
      <p class="table-muted">Minutes before inactive sessions should expire.</p>
    </div>

    <div class="accounts-field">
      <label for="defaultTheme">Default Theme</label>
      <select id="defaultTheme" class="accounts-select">
        <option value="light">Light</option>
        <option value="clinical">Clinical Blue</option>
        <option value="contrast">High Contrast</option>
      </select>
    </div>

    <div class="accounts-field">
      <label for="maintenanceMode">Maintenance Mode</label>
      <select id="maintenanceMode" class="accounts-select">
        <option value="off">Off</option>
        <option value="on">On</option>
      </select>
    </div>

    <div class="accounts-field accounts-field-wide">
      <label for="emailSender">Email Sender</label>
      <input id="emailSender" type="email" class="accounts-input" placeholder="clinic@example.com">
    </div>

    <div class="accounts-field accounts-field-wide">
      <label for="emailReplyTo">Reply-To Email</label>
      <input id="emailReplyTo" type="email" class="accounts-input" placeholder="support@example.com">
    </div>

    <div class="accounts-field accounts-field-full">
      <label for="reportFooter">Report Footer</label>
      <textarea id="reportFooter" class="accounts-input">Generated by DermaView. Results may vary per patient.</textarea>
    </div>

    <div class="accounts-actions">
      <button type="submit" class="accounts-submit">Save Settings</button>
    </div>
  </form>
</div>
